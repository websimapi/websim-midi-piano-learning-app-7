<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDI Piano Learning App</title>
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
    {
        "imports": {
            "tone": "https://esm.sh/@tonejs/midi@2.0.28",
            "tonejs": "https://esm.sh/tone@15.0.4"
        }
    }
    </script>
</head>
<body>
    <div class="app-container">
        <div class="sticky-header">
            <div class="controls">
                <input type="file" id="midi-file" accept=".mid,.midi" class="file-input">
                <button id="play-btn" class="control-btn" disabled>Play</button>
                <button id="stop-btn" class="control-btn" disabled>Stop</button>
                <div class="delay-control">
                    <label for="midi-delay">Start Delay: <span id="delay-value">5</span>s</label>
                    <input type="range" id="midi-delay" min="0" max="10" value="5" step="1">
                </div>
                <div class="octave-info">
                    <span>Octave: <span id="current-octave">4</span></span>
                    <small>(TAB: -1 octave, Numpad8: +1 octave)</small>
                </div>
                <div class="shift-info">
                    <small>(Numpad Enter: Adjust right sub-keyboard)</small>
                </div>
            </div>
            
            <div class="timeline-wrapper">
                <div class="time-display">
                    <span id="current-time-display">0:00</span>
                    <div class="timeline-container" id="timeline-container">
                        <div class="timeline-ticks"></div>
                        <div class="timeline-progress" id="timeline-progress"></div>
                        <div class="timeline-handle" id="timeline-handle"></div>
                    </div>
                    <span id="total-time-display">0:00</span>
                </div>
            </div>
        </div>

        <div id="track-controls" class="track-controls">
            <!-- MIDI track toggles will be generated here -->
        </div>

        <div class="game-area">
            <div class="visualizer-wrapper">
                <canvas id="falling-keys"></canvas>
                <div class="full-keyboard-layout">
                    <div class="piano-container sub-keyboard-container" id="left-sub-keyboard-container">
                        <div class="piano" id="left-sub-keyboard">
                            <!-- Left sub-keyboard keys will be generated by JavaScript -->
                        </div>
                    </div>

                    <div class="piano-container" id="main-piano-container">
                        <div class="piano" id="piano">
                            <!-- Piano keys will be generated by JavaScript -->
                        </div>
                    </div>

                    <div class="piano-container sub-keyboard-container" id="right-sub-keyboard-container">
                        <div class="piano" id="right-sub-keyboard">
                            <!-- Right sub-keyboard keys will be generated by JavaScript -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
